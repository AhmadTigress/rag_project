embedding_model:
  provider: "huggingface"
  model_name: "all-MiniLM-L6-v2"
  
retriever:
  top_k: 10
  search_type: "similarity"
  fetch_k: 20  
  lambda_mult: 0.5  

llm:
  groq:
    provider: "groq"
    model_name: "llama3-8b-8192"
    temperature: 0
    max_output_tokens: 2048

  google:
    provider: "google"
    model_name: "gemini-2.0-flash"
    temperature: 0
    max_output_tokens: 2048